<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Department Management | Employee Portal</title>
    <link rel="shortcut icon" type="image/png" href="../../static/img/general/uph.png">
    <link rel="stylesheet" href="../../static/css/application/application_info.css">
    <link rel="stylesheet" href="../../static/css/admin/admin_dash.css">
    <link rel="stylesheet" href="../../static/css/admin/admin.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background: transparent;
        }

        .sidebar {
            z-index: 1000;
        }

        .dashboard-viewport {
            display: flex;
            height: 100vh;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            gap: 20px;
        }

        .main-content.department-main {
            flex: 1;
            height: 100%;
            margin-left: 320px;
            display: flex;
            min-width: 0;
            transition: margin-left 0.35s ease;
        }

        .sidebar.collapsed ~ .dashboard-viewport .main-content.department-main {
            margin-left: 110px;
        }

        .form-card.department-card {
            background: #ffffff;
            border-radius: 25px;
            padding: 25px 32px;
            width: 100%;
            height: 100%;
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            box-sizing: border-box;
        }

        .form-body.department-body {
            flex: 1;
            overflow: auto;
            padding-right: 0.5rem;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .form-body.department-body::-webkit-scrollbar {
            display: none;
        }

        .admin-section {
            padding: 0;
            background: transparent;
            min-height: auto;
        }

        .section-header {
            margin-bottom: 1.5rem;
        }

        .table-view {
            margin-top: 1rem;
        }

        .department-card .card-header {
            position: relative;
        }

        .action-cell {
            position: relative;
            text-align: center;
        }

        .action-btn {
            padding: 0;
            margin: 0 0 0 auto;
            min-width: 0;
            width: auto;
            height: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: transparent;
            box-shadow: none;
            color: #fff;
            font-size: 1rem;
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
        }

        .action-btn i {
            color: #fff;
        }

        .action-btn:hover,
        .action-btn:focus,
        .action-btn:active {
            background: transparent;
            box-shadow: none;
            outline: none;
            color: #fff;
        }

        .action-btn:focus-visible {
            outline: none;
        }

        .department-card .card-header .dropdown-menu {
            right: 0;
            top: calc(100% + 0.5rem);
        }

        .action-cell.open .dropdown-menu,
        .department-card.open .dropdown-menu {
            display: block;
        }

        @media (max-width: 1100px) {
            .main-content.department-main {
                margin-left: 110px;
            }
        }

        @media (max-width: 768px) {
            .dashboard-viewport {
                padding: 12px;
                gap: 12px;
            }

            .main-content.department-main {
                margin-left: 0;
            }

            .form-card.department-card {
                padding: 18px;
                border-radius: 18px;
            }
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="sidebar" id="sidebar">
        <div class="top-section">
            <div class="logo-wrapper" id="logoToggle">
                <img src="../../static/img/general/uph.png" class="logo" alt="Logo">
                <div class="open-icon"><i class="fas fa-chevron-right"></i></div>
            </div>
            <button class="close-btn" id="closeBtn"><i class="fas fa-chevron-left"></i></button>
        </div>

        <ul class="menu">
            <li><a href="dashboard.html" class="menu-item"><i class="fas fa-home"></i> <span>Dashboard</span></a></li>
            <li><a href="user_management.html" class="menu-item"><i class="fas fa-users"></i> <span>User Management</span></a></li>
            <li><a href="department_management.html" class="menu-item active"><i class="fas fa-sitemap"></i> <span>Department Management</span></a></li>
            <li><a href="audit_trails.html" class="menu-item"><i class="fas fa-history"></i> <span>Audit Trails</span></a></li>
        </ul>

        <div class="bottom-section">
            <a href="../login/login.html" class="menu-item logout"><i class="fas fa-sign-out-alt"></i> <span>Log Out</span></a>
        </div>
    </div>

    <div class="dashboard-viewport">
    <main class="main-content department-main">
        <div class="form-card department-card">
            <div class="form-body department-body">
                <div class="admin-section">
                    <div class="section-header">
                        <h1>Department Management</h1>
                        <button class="btn btn-primary" id="addDepartmentBtn">
                            <i class="fas fa-plus"></i> Add Department
                        </button>
                    </div>

                    <div class="filters-container">
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" id="departmentSearch" placeholder="Search departments...">
                        </div>
                        <select id="headFilter" class="filter-select">
                            <option value="">All Departments</option>
                            <option value="unassigned">Without Head</option>
                            <option value="assigned">With Head</option>
                        </select>
                    </div>

                    <div class="view-toggle">
                        <button class="toggle-btn active" data-view="grid">
                            <i class="fas fa-th"></i> Grid View
                        </button>
                        <button class="toggle-btn" data-view="list">
                            <i class="fas fa-list"></i> List View
                        </button>
                    </div>

                    <div id="departmentsGrid" class="departments-grid"></div>

                    <div id="departmentsTable" class="table-view" style="display: none;">
                        <div class="table-container">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>Department Name</th>
                                        <th>Department Head</th>
                                        <th>Total Employees</th>
                                        <th>Email</th>
                                        <th>Location</th>
                                        <th>Created Date</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="departmentsTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    </div>

    <div id="departmentModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="deptModalTitle">Add Department</h2>

            <form id="departmentForm">
                <input type="hidden" id="deptId">

                <div class="form-group">
                    <label>Department Name *</label>
                    <input type="text" id="deptName" name="name" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="deptEmail" name="email" placeholder="department@hrers.local">
                </div>

                <div class="form-group">
                    <label>Location</label>
                    <input type="text" id="deptLocation" name="location" placeholder="Building, Floor">
                </div>

                <div class="form-group">
                    <label>Budget (Optional)</label>
                    <input type="number" id="deptBudget" name="budget" step="0.01" min="0">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save Department</button>
                    <button type="button" class="btn btn-secondary" onclick="closeDepartmentModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <div id="assignHeadModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Assign Department Head</h2>
            <p id="deptNameDisplay"></p>

            <form id="assignHeadForm">
                <input type="hidden" id="assignHeadDeptId">

                <div class="form-group">
                    <label>Select Department Head *</label>
                    <div class="head-selection">
                        <input type="text" id="headSearch" placeholder="Search by name or email...">
                        <div id="headList" class="head-list"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label>
                        <input type="checkbox" id="notifyHead">
                        Send notification to new department head
                    </label>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Assign Head</button>
                    <button type="button" class="btn btn-secondary" onclick="closeAssignHeadModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <div id="confirmModal" class="modal">
        <div class="modal-content modal-small">
            <h2>Confirm Action</h2>
            <p id="confirmMessage"></p>
            <div class="form-actions">
                <button class="btn btn-primary" id="confirmBtn">Confirm</button>
                <button class="btn btn-secondary" onclick="closeConfirmModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="../../static/js/admin/sidebar.js"></script>
    <script src="../../static/js/admin/department_management.js"></script>
</body>
</html>
